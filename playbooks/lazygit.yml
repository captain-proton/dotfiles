---
- name: "[ LAZYGIT ]"
  hosts: all

  vars:
    _lazygit_side_by_side: "{{ lazygit_side_by_side | default(true) }}"
    _aliases_path: "{{ lookup('env', 'HOME') }}/.aliases"
    # Use one from https://github.com/catppuccin
    _lazygit_theme_active_border_color: "#89b4fa"
    _lazygit_theme_inactive_border_color: "#a6adc8"
    _lazygit_theme_searching_active_border_color: "#f9e2af"
    _lazygit_theme_options_text_color: "#89b4fa"
    _lazygit_theme_selected_line_bg_color: "#313244"
    _lazygit_theme_inactive_view_selected_line_bg_color: "#6c7086"
    _lazygit_theme_cherry_picked_commit_fg_color: "#89b4fa"
    _lazygit_theme_cherry_picked_commit_bg_color: "#45475a"
    _lazygit_theme_marked_base_commit_fg_color: "#89b4fa"
    _lazygit_theme_marked_base_commit_bg_color: "#f9e2af"
    _lazygit_theme_unstaged_changes_color: "#f38ba8"
    _lazygit_theme_default_fg_color: "#cdd6f4"

  tasks:

    - name: Ensure lazygit is present
      become: true
      community.general.pacman:
        name: "{{ item }}"
        state: present
      loop:
        - lazygit
        - git-delta

    - name: Create lazygit config dir
      tags: ["config"]
      ansible.builtin.file:
        path: "{{ home }}/.config/lazygit"
        state: directory
        mode: "0750"

    - name: Configure lazygit
      tags: ["config"]
      ansible.builtin.template:
        src: ../templates/lazygit.yml.j2
        dest: "{{ home }}/.config/lazygit/config.yml"
        mode: "0640"

    - name: Configure lazygit aliases
      tags: ["config"]
      ansible.builtin.lineinfile:
        path: "{{ _aliases_path }}"
        line: "alias {{ item.alias }}='{{ item.value }}'"
      loop:
        - alias: lg
          value: lazygit
