---
- name: "[ YAZI FILE MANAGER ]"
  hosts: all

  vars:
    _yazi_default_flavors:
      - catppuccin-frappe
      - catppuccin-latte
      - catppuccin-macchiato
      - catppuccin-mocha
      - dracula
    _yazi_flavors: "{{ yazi_flavors | default(_yazi_default_flavors) }}"
    _yazi_dark_theme: "{{ yazi_dark_theme | default('catppuccin-mocha') }}"
    _yazi_light_theme: "{{ yazi_light_theme | default('catppuccin-latte') }}"

  tasks:

    - name: Install yazi file manager
      become: true
      community.general.pacman:
        name: "{{ item }}"
        state: present
      loop:
        - yazi
        - ffmpegthumbnailer
        - p7zip
        - jq
        - poppler
        - fd
        - ripgrep
        - fzf
        - zoxide
        - imagemagick
        - gvfs
        - glib2

    - name: Make sure yazi config dir exists
      tags: ["config"]
      ansible.builtin.file:
        path: "{{ home }}/.config/yazi"
        state: directory
        mode: "0750"

    - name: Configure yazi
      tags: ["config"]
      ansible.builtin.template:
        src: ../templates/{{ item.src }}
        dest: "{{ home }}/.config/yazi/{{ item.dest }}"
        mode: "0750"
      loop:
        - src: yazi.toml.j2
          dest: yazi.toml
        - src: yazi.keymap.toml.j2
          dest: keymap.toml
        - src: yazi.theme.toml.j2
          dest: theme.toml

    - name: Ensure yazi flavors dir is present
      tags: ["config"]
      ansible.builtin.file:
        path: "{{ home }}/.config/yazi/flavors/{{ item }}.yazi"
        state: directory
        mode: "0755"
      loop: "{{ _yazi_flavors }}"

    - name: Download yazi flavor files
      tags: ["config"]
      ansible.builtin.get_url:
        url: "https://github.com/yazi-rs/flavors/raw/refs/heads/main/{{ item }}.yazi/flavor.toml"
        dest: "{{ home }}/.config/yazi/flavors/{{ item }}.yazi/"
        mode: "0644"
      loop: "{{ _yazi_flavors }}"

    - name: Download yazi tmtheme files
      tags: ["config"]
      ansible.builtin.get_url:
        url: "https://github.com/yazi-rs/flavors/raw/refs/heads/main/{{ item }}.yazi/tmtheme.xml"
        dest: "{{ home }}/.config/yazi/flavors/{{ item }}.yazi/"
        mode: "0644"
      loop: "{{ _yazi_flavors }}"
