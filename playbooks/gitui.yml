---
- name: "[ GITUI ]"
  hosts: all

  vars:
    aliases_path: "{{ lookup('env', 'HOME') }}/.aliases"
    _gitui_config_dir: "{{ home }}/.config/gitui"
    _gitui_theme_base_url: "https://github.com/catppuccin/gitui/raw/refs/heads/main/themes"
    _gitui_theme_files:
      - "catppuccin-frappe.ron"
      - "catppuccin-latte.ron"
      - "catppuccin-macchiato.ron"
      - "catppuccin-mocha.ron"
    _gitui_theme: "catppuccin-mocha.ron"

  tasks:
    - name: Install gitui
      become: true
      community.general.pacman:
        name: gitui
        state: present

    - name: Ensure config dir is present
      ansible.builtin.file:
        path: "{{ _gitui_config_dir }}"
        state: directory
        mode: "0750"

    - name: Load themes
      ansible.builtin.get_url:
        url: "{{ _gitui_theme_base_url }}/{{ item }}"
        dest: "{{ _gitui_config_dir }}/{{ item }}"
        mode: "0644"
      loop: "{{ _gitui_theme_files }}"

    - name: Set the gitui alias
      ansible.builtin.lineinfile:
        path: "{{ aliases_path }}"
        line: "alias gitui='gitui -t {{ _gitui_theme }}'"
